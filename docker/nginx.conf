server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;

    # Always issue relative redirects so this container works behind any
    # host port / reverse proxy without the Location header leaking
    # nginx's internal listen port (80).
    absolute_redirect off;

    # Convenience: bare root redirects to the docs landing page.
    location = / {
        return 302 /docs/;
    }

    # YAML specs should be served as text so browsers display them
    # rather than offering a download.
    location ~ \.ya?ml$ {
        default_type text/plain;
        add_header   Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Silence noise from missing favicon requests.
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
        return 204;
    }
}
